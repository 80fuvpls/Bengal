<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HOME</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
    }

    /* ===== FONTS ===== */
    @font-face {
      font-family: 'Melodrama';
      src: url('assets/fonts/Melodrama-Semibold.woff2') format('woff2');
      font-weight: 700;
    }

  @font-face { 
  font-family: 'Melodrama'; 
  src: url('assets/fonts/Melodrama-Bold.woff2') format('woff2');
  font-weight: 800;
}

    @font-face {
      font-family: 'GeneralSans';
      src: url('assets/fonts/GeneralSans-Regular.woff2') format('woff2');
      font-weight: 500;
    }

    @font-face {
      font-family: 'Azeret Mono';
      src: url('assets/fonts/AzeretMono-Thin.woff2') format('woff2');
      font-weight: 100;
    }

    @font-face {
  font-family: "ProjectFont";
  src: url("assets/fonts/ProjectFont.otf") format("opentype");
  font-weight: normal;
  font-style: normal;
}

    /* ===== UI ===== */
    .ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .brand {
      position: absolute;
      top: 30px;
      left: 40px;
      color: #ffffe3;
      font-family: 'Melodrama';
      font-weight: 700;
      font-size: 37px;
    }

    .nav {
      position: absolute;
      top: 30px;
      right: 40px;
      display: flex;
      gap: 30px;
      pointer-events: auto;
    }

    .nav a {
      color: #ffffe3;
      font-family: 'GeneralSans';
      font-size: 16px;
      cursor: pointer;
      position: relative;
      transition: all 0.25s ease;
    }

    .nav a:hover {
      transform: scale(1.15);
    }

    .nav a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0%;
      height: 2px;
      background: white;
      transition: width 0.25s ease;
    }

    .nav a:hover::after {
      width: 100%;
    }

    

    .hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: 'GeneralSans';
      font-size: 12px;
      opacity: 0.7;
      letter-spacing: 1px;
    }
    
    /* ===== LOADER ===== */

#loader{
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 99999;

  display: flex;
  justify-content: center;
  align-items: center;

  transition:
    opacity 1.2s ease,
    visibility 1.2s ease;
}

#loader.hide{
  opacity: 0;
  visibility: hidden;
}

.loader-center{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 34px;
}

/* ===== SATURN ===== */

.loader-saturn{
  position: relative;
  width: 90px;
  height: 90px;

  animation: loaderFloat 4s ease-in-out infinite;
}

.loader-planet{
  position: absolute;
  inset: 0;
  margin: auto;

  width: 42px;
  height: 42px;

  border-radius: 50%;

  border: 1px solid rgba(255,255,227,0.7);

  background:
    radial-gradient(
      circle at 30% 30%,
      rgba(255,255,227,0.2),
      rgba(255,255,227,0.02)
    );

  backdrop-filter: blur(2px);
}

.loader-ring{
  position: absolute;
  inset: 0;
  margin: auto;

  width: 88px;
  height: 32px;

  border-radius: 50%;

  border: 1px solid rgba(255,255,227,0.5);

  transform: rotate(-18deg);

  opacity: 0.9;
}

.loader-ring::before,
.loader-ring::after{
  content: '';
  position: absolute;
  inset: 0;

  border-radius: 50%;
  border: 1px solid rgba(255,255,227,0.22);
}

.loader-ring::before{
  transform: scale(1.08);
}

.loader-ring::after{
  transform: scale(0.92);
}

/* ===== TEXT ===== */

.loader-progress{
  color: #ffffe3;
  font-family: 'GeneralSans';
  font-size: 13px;
  letter-spacing: 2px;
  opacity: 0.85;
}

/* ===== ANIM ===== */

@keyframes loaderFloat{
  0%{
    transform:
      translateY(0px)
      rotate(0deg);
  }

  50%{
    transform:
      translateY(-6px)
      rotate(2deg);
  }

  100%{
    transform:
      translateY(0px)
      rotate(0deg);
  }
}
  </style>
</head>
<body data-page="home">

  <!-- ===== LOADER ===== -->
<div id="loader">

  <div class="loader-center">

    <div class="loader-saturn">
      <div class="loader-ring"></div>
      <div class="loader-planet"></div>
    </div>

    <div class="loader-progress">
      <span id="loadPercent">0%</span>
    </div>

  </div>

</div>
  <canvas id="scene"></canvas>

  <div class="ui">
    <div class="brand">BENGAL</div>

    <div class="nav">
      <a href="index.html">HOME</a>
      <a href="works.html">WORKS</a>
      <a href="info.html">INFO</a>
    </div>

    <div class="hint">DRAG OR SCROLL TO DISCOVER</div>
  </div>

  <script type="module" src="./main.js"></script>

</body>
</html>
